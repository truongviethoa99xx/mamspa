services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: mahaspa-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    env_file:
      - .env
    environment:
      # Override host-local values so containers talk to each other by service name.
      DB_HOST: mysql
      DB_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RUN_MIGRATIONS: "true"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      # Persist uploads, logs and the framework cache across rebuilds.
      - storage-data:/var/www/storage

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    # The app connects as root (DB_USERNAME=root), so the root password must
    # match DB_PASSWORD. No extra MYSQL_USER is created (root cannot be one).
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-mahaspa}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "${DB_FORWARD_PORT:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${DB_PASSWORD:-secret}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

volumes:
  mysql-data:
  redis-data:
  storage-data:
